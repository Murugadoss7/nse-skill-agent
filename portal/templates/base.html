<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Portal</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪐</text></svg>">
</head>
<body>
    <div class="topbar">
        <h1><span>🪐</span> Hermes Portal</h1>
        <div style="display:flex;align-items:center;gap:12px;">
            <div class="server-info">📡 {{ now }}</div>
            <a href="/auth/logout" style="font-size:12px;color:var(--text-dim);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:4px;">🚪 Logout</a>
        </div>
    </div>

    <nav>
        <a href="/" class="{% if page == 'dashboard' %}active{% endif %}">📊 Dashboard</a>
        <a href="/scripts" class="{% if page == 'scripts' %}active{% endif %}">📜 Scripts</a>
        <a href="/skills" class="{% if page == 'skills' %}active{% endif %}">🧠 Skills</a>
        <a href="/cron" class="{% if page == 'cron' %}active{% endif %}">⏰ Cron Jobs</a>
        <a href="/pipeline" class="{% if page == 'pipeline' %}active{% endif %}">📈 Pipeline</a>
        <a href="/outputs" class="{% if page == 'outputs' %}active{% endif %}">📁 Outputs</a>
        <a href="/sme" class="{% if page == 'sme' %}active{% endif %}">🧠 SME Intel</a>
        <a href="/search" class="{% if page == 'search' %}active{% endif %}">🔍 Search</a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        {% if page == 'dashboard' %}
        setTimeout(() => location.reload(), 60000);
        {% endif %}

        {% if page == 'search' %}
        const searchInput = document.getElementById('search-input');
        if (searchInput) {
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const q = encodeURIComponent(this.value.trim());
                    if (q) window.location.href = '/search?q=' + q;
                }
            });
        }
        {% endif %}
    </script>
</body>
</html>
